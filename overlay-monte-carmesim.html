<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Overlay · Monte Carmesim</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body {
    background: transparent !important;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Barlow Condensed', sans-serif;
  }

  /* ── LAYOUT PRINCIPAL ── */
  .overlay-layout {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-columns: 240px 200px 1fr;
    grid-template-rows: 1fr 60px;
    gap: 0;
  }

  /* ── COLUNA ESQUERDA — Players ── */
  .col-players {
    grid-row: 1 / 2;
    grid-column: 1;
    background: rgba(237,232,220,0.92);
    border-right: 2px solid rgba(139,26,26,0.4);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .col-header {
    font-family: 'Oswald', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #8B1A1A;
    padding: 8px 12px 6px;
    border-bottom: 1px solid rgba(139,26,26,0.25);
    background: rgba(237,232,220,0.98);
  }
  .players-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  /* ── COLUNA MEIO — Rolagens ── */
  .col-rolls {
    grid-row: 1 / 2;
    grid-column: 2;
    background: rgba(20,10,8,0.88);
    border-right: 2px solid rgba(139,26,26,0.4);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .col-rolls .col-header {
    color: rgba(184,134,11,0.95);
    background: rgba(20,10,8,0.98);
    border-bottom: 1px solid rgba(139,26,26,0.35);
  }
  .rolls-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  /* ── ÁREA CENTRAL — Transparente ── */
  .col-center {
    grid-row: 1 / 2;
    grid-column: 3;
    background: transparent !important;
    /* Completamente transparente — tabletop aparece aqui */
  }

  /* ── BARRA INFERIOR ── */
  .bottom-bar {
    grid-row: 2;
    grid-column: 1 / 4;
    background: rgba(20,10,8,0.88);
    border-top: 2px solid rgba(139,26,26,0.5);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 20px;
  }
  .bottom-title {
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(212,204,187,0.6);
  }
  .bottom-title span { color: #8B1A1A; }
  .bottom-sep {
    width: 1px;
    height: 30px;
    background: rgba(139,26,26,0.35);
  }
  .clima-info {
    display: none;
    align-items: center;
    gap: 10px;
  }
  .clima-info.show { display: flex; }
  .cicon  { font-size: 18px; }
  .ctitle { font-family: 'Oswald', sans-serif; font-size: 13px; color: #90caf9; letter-spacing: 2px; }
  .ctemp  { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: #90caf9; }
  .bottom-right {
    margin-left: auto;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: rgba(184,134,11,0.5);
    letter-spacing: 2px;
  }

  /* ── PLAYER CARD ── */
  .pcard {
    background: rgba(255,255,255,0.55);
    border: 1px solid rgba(139,26,26,0.3);
    border-left: 3px solid #8B1A1A;
    border-radius: 3px;
    padding: 6px 8px 5px;
    transition: opacity 0.4s;
  }
  .pcard.offline { opacity: 0.4; border-left-color: #aaa; filter: grayscale(40%); }

  .pcard-top {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 5px;
  }
  .pcard-avatar {
    width: 36px; height: 36px; flex-shrink: 0;
    border-radius: 3px; border: 1.5px solid rgba(139,26,26,0.5);
    background: rgba(139,26,26,0.1);
    overflow: hidden; display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: rgba(139,26,26,0.4);
  }
  .pcard-avatar img { width:100%; height:100%; object-fit:cover; display:block; }
  .pcard-info { flex: 1; min-width: 0; }
  .pname {
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #1a0a00;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .odot { width:7px; height:7px; border-radius:50%; flex-shrink:0; margin-left:auto; }
  .odot.on  { background:#4caf50; box-shadow:0 0 5px #4caf50; }
  .odot.off { background:#aaa; }

  .srow { display:flex; align-items:center; gap:5px; margin-bottom:3px; }
  .slbl { font-family:'Share Tech Mono',monospace; font-size:8px; color:#6b5e50; width:24px; flex-shrink:0; }
  .bbg  { flex:1; height:6px; background:rgba(0,0,0,0.12); border-radius:2px; overflow:hidden; }
  .bfill { height:100%; border-radius:2px; transition:width .5s; }
  .bfill.pv  { background:linear-gradient(to right,#8B1A1A,#ef5350); }
  .bfill.pe  { background:linear-gradient(to right,#005a52,#26a69a); }
  .bfill.san { background:linear-gradient(to right,#3a1050,#ab47bc); }
  .sval { font-family:'Share Tech Mono',monospace; font-size:9px; color:#1a0a00; width:36px; text-align:right; flex-shrink:0; }

  .fear-wrap { margin-top:4px; padding-top:4px; border-top:1px solid rgba(139,26,26,0.2); }
  .fear-top  { display:flex; justify-content:space-between; align-items:center; margin-bottom:2px; }
  .flbl { font-family:'Share Tech Mono',monospace; font-size:8px; color:#6b5e50; }
  .fnum { font-family:'Oswald',sans-serif; font-size:12px; font-weight:700; }
  .fpips { display:flex; gap:1.5px; }
  .fpip  { flex:1; height:4px; border-radius:1px; transition:background .3s; }

  /* ── ROLL ITEM ── */
  .ritem {
    background: rgba(255,255,255,0.04);
    border-left: 2px solid #8B1A1A;
    border-radius: 2px;
    padding: 5px 8px;
    animation: rIn .3s ease;
  }
  .ritem.master { border-left-color: #B8860B; }
  @keyframes rIn { from{opacity:0;transform:translateX(-4px)} to{opacity:1;transform:translateX(0)} }
  .rplayer { font-family:'Oswald',sans-serif; font-size:10px; font-weight:700; color:rgba(212,204,187,.9); letter-spacing:1px; }
  .rplayer.m { color:rgba(184,134,11,.95); }
  .rtotal { font-family:'Oswald',sans-serif; font-size:24px; font-weight:700; color:#fff; line-height:1.1; }
  .rtotal.crit { color:#4caf50; text-shadow:0 0 10px rgba(76,175,80,.6); }
  .rtotal.fail { color:#ef5350; text-shadow:0 0 10px rgba(239,83,80,.6); }
  .rdetail { font-family:'Share Tech Mono',monospace; font-size:8px; color:rgba(212,204,187,.4); }
  .rtime { font-family:'Share Tech Mono',monospace; font-size:7px; color:rgba(184,134,11,.5); float:right; }

  /* ── POPUP ── */
  .popup { position:absolute; font-family:'Oswald',sans-serif; font-size:28px; font-weight:700; pointer-events:none; z-index:999; animation:popUp 1.5s ease-out forwards; }
  .popup.dmg  { color:#ef5350; text-shadow:0 2px 10px rgba(239,83,80,.7); }
  .popup.heal { color:#4caf50; text-shadow:0 2px 10px rgba(76,175,80,.7); }
  .popup.san  { color:#ab47bc; text-shadow:0 2px 10px rgba(171,71,188,.7); }
  .popup.fear { color:#ff9800; text-shadow:0 2px 10px rgba(255,152,0,.7); }
  @keyframes popUp {
    0%  { opacity:1; transform:translateY(0) scale(1); }
    50% { opacity:1; transform:translateY(-35px) scale(1.15); }
    100%{ opacity:0; transform:translateY(-70px) scale(.8); }
  }
</style>
</head>
<body>

<div class="overlay-layout">

  <!-- COLUNA PLAYERS -->
  <div class="col-players">
    <div class="col-header">▓ Players</div>
    <div class="players-list" id="players-list"></div>
  </div>

  <!-- COLUNA ROLAGENS -->
  <div class="col-rolls">
    <div class="col-header">🎲 Rolagem</div>
    <div class="rolls-list" id="rolls-list">
      <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(212,204,187,.3);text-align:center;padding:12px 0;">Aguardando...</div>
    </div>
  </div>

  <!-- ÁREA CENTRAL TRANSPARENTE -->
  <div class="col-center"></div>

  <!-- BARRA INFERIOR -->
  <div class="bottom-bar">
    <div class="bottom-title">☠ <span>Monte</span> Carmesim</div>
    <div class="bottom-sep"></div>
    <div class="clima-info" id="clima-info">
      <span class="cicon" id="cicon">🌙</span>
      <span class="ctitle" id="ctitle">—</span>
      <span class="ctemp" id="ctemp"></span>
    </div>
    <div class="bottom-right">ORDEM PARANORMAL · SOBREVIVENDO AO HORROR</div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const db = getDatabase(initializeApp({
  apiKey:"AIzaSyCSQXdyLvqC4zT2BkSwUKk-uostVn2BmA8",
  authDomain:"rpg-ficha-monte-carmesim.firebaseapp.com",
  databaseURL:"https://rpg-ficha-monte-carmesim-default-rtdb.firebaseio.com",
  projectId:"rpg-ficha-monte-carmesim",
  storageBucket:"rpg-ficha-monte-carmesim.firebasestorage.app",
  messagingSenderId:"909026041375",
  appId:"1:909026041375:web:df06386967dd9181a23f2a"
}));

const ORDER = ['Lucas','Gabi','Joao','Karina','Ana'];
let prev = {};
let avatars = {}; // cache de avatares por player key

// ── Avatares ───────────────────────────────────────────────────────────────
ORDER.forEach(name => {
  onValue(ref(db, `players/${name}/avatar`), snap => {
    avatars[name] = snap.exists() ? snap.val() : null;
    // Re-renderizar o card se ele existir
    const card = document.getElementById('pc-'+name);
    if (card) {
      const av = card.querySelector('.pcard-avatar');
      if (av) {
        av.innerHTML = avatars[name]
          ? `<img src="${avatars[name]}" alt="">`
          : '☠';
      }
    }
  });
});

// ── Players ────────────────────────────────────────────────────────────────
onValue(ref(db,'players'), snap => {
  const data = snap.val() || {};

  ORDER.forEach(n => {
    const ps = prev[n]?.stats || {}, cs = data[n]?.stats || {};
    ['pv','pe','san'].forEach(k => {
      const a=parseInt(ps[k+'_atual'])||0, b=parseInt(cs[k+'_atual'])||0;
      if (a && a!==b) spawnPopup(n,k,b-a);
    });
    const pf=parseInt(ps.fear)||0, cf=parseInt(cs.fear)||0;
    if (pf && pf!==cf) spawnPopup(n,'fear',cf-pf);
  });
  prev = JSON.parse(JSON.stringify(data));
  renderPlayers(data);
});

function renderPlayers(data) {
  const list = document.getElementById('players-list');
  ORDER.filter(n => data[n]).forEach(name => {
    const p=data[name], st=p.stats||{};
    const online=p.online===true;
    const pv=parseInt(st.pv_atual)||0, pvM=parseInt(st.pv_max)||1;
    const pe=parseInt(st.pe_atual)||0, peM=parseInt(st.pe_max)||1;
    const san=parseInt(st.san_atual)||0, sanM=parseInt(st.san_max)||1;
    const fear=parseInt(st.fear)||0;
    const pct=(a,b)=>Math.min(100,Math.max(0,Math.round(a/b*100)));
    const fc=fear<=4?'#4caf50':fear<=8?'#cddc39':fear<=12?'#ff9800':fear<=16?'#f44336':'#b71c1c';
    const pips=Array.from({length:20},(_,i)=>{
      const col=i<4?'#4caf50':i<8?'#cddc39':i<12?'#ff9800':i<16?'#f44336':'#b71c1c';
      return `<div class="fpip" style="background:${i<fear?col:'rgba(0,0,0,0.15)'}"></div>`;
    }).join('');

    const agentName = p.ficha?.inputs?.id_nome?.trim() || name;
    const avatarHtml = avatars[name]
      ? `<img src="${avatars[name]}" alt="">`
      : '☠';

    let card=document.getElementById('pc-'+name);
    if (!card) { card=document.createElement('div'); card.id='pc-'+name; list.appendChild(card); }
    card.className='pcard'+(online?'':' offline');
    card.innerHTML=`
      <div class="pcard-top">
        <div class="pcard-avatar">${avatarHtml}</div>
        <div class="pcard-info"><div class="pname">${agentName}</div></div>
        <div class="odot ${online?'on':'off'}"></div>
      </div>
      <div class="srow"><div class="slbl">PV</div><div class="bbg"><div class="bfill pv" style="width:${pct(pv,pvM)}%"></div></div><div class="sval">${pv}/${pvM}</div></div>
      <div class="srow"><div class="slbl">PE</div><div class="bbg"><div class="bfill pe" style="width:${pct(pe,peM)}%"></div></div><div class="sval">${pe}/${peM}</div></div>
      <div class="srow" style="margin-bottom:0"><div class="slbl">SAN</div><div class="bbg"><div class="bfill san" style="width:${pct(san,sanM)}%"></div></div><div class="sval">${san}/${sanM}</div></div>
      <div class="fear-wrap">
        <div class="fear-top"><span class="flbl">☠ MEDO</span><span class="fnum" style="color:${fc}">${fear}/20</span></div>
        <div class="fpips">${pips}</div>
      </div>`;
  });
  Array.from(list.children).forEach(c=>{ if (!data[c.id.replace('pc-','')]) c.remove(); });
}

// ── Rolls ──────────────────────────────────────────────────────────────────
onValue(ref(db,'rolls'), snap => {
  const d=snap.val(); const list=document.getElementById('rolls-list');
  if (!d||!Object.keys(d).length) {
    list.innerHTML='<div style="font-family:\'Share Tech Mono\',monospace;font-size:9px;color:rgba(212,204,187,.3);text-align:center;padding:12px 0;">Aguardando...</div>';
    return;
  }
  const entries=Object.entries(d).map(([p,r])=>({player:p,...r})).sort((a,b)=>(b.ts||0)-(a.ts||0)).slice(0,10);
  list.innerHTML='';
  entries.forEach(({player,label,rolls,total,ts})=>{
    const time=ts?new Date(ts).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'';
    const isMaster=player==='🎲 Mestre';
    const dieMax=parseInt((label||'').match(/d(\d+)/)?.[1]||20);
    const p=total/(dieMax*(rolls?.length||1));
    const rc=p>=0.9?'crit':p<=0.1?'fail':'';
    const el=document.createElement('div');
    el.className='ritem'+(isMaster?' master':'');
    el.innerHTML=`<span class="rtime">${time}</span><div class="rplayer ${isMaster?'m':''}">${player}</div><div class="rtotal ${rc}">${total}</div><div class="rdetail">${label}${rolls&&rolls.length>1?' ['+rolls.join(', ')+']':''}</div>`;
    list.appendChild(el);
  });
});

// ── Clima ──────────────────────────────────────────────────────────────────
onValue(ref(db,'clima'), snap=>{
  const d=snap.val(); const info=document.getElementById('clima-info');
  if (!d||!d.active) { info.classList.remove('show'); return; }
  info.classList.add('show');
  document.getElementById('cicon').textContent=d.icon||'🌙';
  document.getElementById('ctitle').textContent=d.titulo||'—';
  document.getElementById('ctemp').textContent=d.temp||'';
});

// ── Popup ──────────────────────────────────────────────────────────────────
function spawnPopup(name,stat,delta) {
  const card=document.getElementById('pc-'+name); if (!card) return;
  const rect=card.getBoundingClientRect();
  const el=document.createElement('div');
  const type=delta>0?'heal':stat==='san'?'san':stat==='fear'?'fear':'dmg';
  const icon=stat==='san'?'🧠':stat==='fear'?'☠':stat==='pe'?'◈':'❤';
  el.className='popup '+type;
  el.textContent=(delta>0?'+':'')+delta+' '+icon;
  el.style.left=(rect.left+rect.width*.3)+'px';
  el.style.top=(rect.top+rect.height*.2)+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}
</script>
</body>
</html>
