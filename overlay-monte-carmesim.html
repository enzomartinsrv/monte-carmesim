<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Overlay · Monte Carmesim</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --blood:#8B1A1A; --crimson:#C0392B; --accent:#B8860B;
    --card-bg:rgba(237,232,220,0.88);
    --card-border:rgba(139,26,26,0.5);
    --dark-bg:rgba(10,8,6,0.82);
    --dark-border:rgba(139,26,26,0.6);
    --bone:#1a0a00; --ash:#6b5e50;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body {
    background: transparent !important;
    width:1920px; height:1080px;
    overflow:hidden;
    font-family:'Barlow Condensed',sans-serif;
  }

  /* ── LEFT — Player Cards ── */
  .left-panel {
    position:absolute;
    top:30px; left:20px;
    width:230px;
    display:flex;
    flex-direction:column;
    gap:7px;
  }

  /* Panel title */
  .panel-title {
    font-family:'Oswald',sans-serif;
    font-size:9px;
    font-weight:700;
    letter-spacing:4px;
    text-transform:uppercase;
    color:rgba(184,134,11,0.9);
    margin-bottom:2px;
    text-shadow:0 1px 4px rgba(0,0,0,0.8);
  }

  .player-card {
    background:var(--card-bg);
    border:1px solid var(--card-border);
    border-left:3px solid var(--blood);
    border-radius:3px;
    padding:7px 9px 6px;
    backdrop-filter:blur(6px);
    transition:all 0.3s ease;
  }
  .player-card.offline { opacity:0.45; filter:grayscale(40%); }

  .card-top {
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:5px;
  }
  .player-name {
    font-family:'Oswald',sans-serif;
    font-size:14px;
    font-weight:700;
    letter-spacing:2px;
    text-transform:uppercase;
    color:#1a0a00;
  }
  .online-dot {
    width:7px; height:7px;
    border-radius:50%; flex-shrink:0;
  }
  .online-dot.on  { background:#4caf50; box-shadow:0 0 5px #4caf50; }
  .online-dot.off { background:#888; }

  /* Stat bars */
  .stat-row {
    display:flex;
    align-items:center;
    gap:5px;
    margin-bottom:3px;
  }
  .stat-lbl {
    font-family:'Share Tech Mono',monospace;
    font-size:8px;
    color:var(--ash);
    width:24px;
    flex-shrink:0;
  }
  .bar-bg {
    flex:1;
    height:6px;
    background:rgba(0,0,0,0.12);
    border-radius:2px;
    overflow:hidden;
  }
  .bar-fill {
    height:100%;
    border-radius:2px;
    transition:width 0.5s ease;
  }
  .bar-fill.pv  { background:linear-gradient(to right,#8B1A1A,#ef5350); }
  .bar-fill.pe  { background:linear-gradient(to right,#00695c,#26a69a); }
  .bar-fill.san { background:linear-gradient(to right,#4A235A,#ab47bc); }
  .stat-val {
    font-family:'Share Tech Mono',monospace;
    font-size:9px;
    color:#1a0a00;
    width:36px;
    text-align:right;
    flex-shrink:0;
  }

  /* Fear */
  .fear-wrap {
    margin-top:4px;
    padding-top:4px;
    border-top:1px solid rgba(139,26,26,0.2);
  }
  .fear-top {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:3px;
  }
  .fear-lbl {
    font-family:'Share Tech Mono',monospace;
    font-size:8px;
    color:var(--ash);
    letter-spacing:0.5px;
  }
  .fear-num {
    font-family:'Oswald',sans-serif;
    font-size:12px;
    font-weight:700;
    transition:color 0.4s;
  }
  .fear-pips {
    display:flex;
    gap:1.5px;
  }
  .pip {
    flex:1;
    height:4px;
    border-radius:1px;
    transition:background 0.3s;
  }

  /* ── RIGHT — Roll Feed ── */
  .right-panel {
    position:absolute;
    top:30px; right:20px;
    width:220px;
    display:flex;
    flex-direction:column;
    gap:6px;
  }

  .roll-feed {
    background:var(--dark-bg);
    border:1px solid var(--dark-border);
    border-radius:4px;
    padding:8px 10px;
    backdrop-filter:blur(8px);
    flex:1;
    max-height:480px;
    overflow:hidden;
  }
  .roll-feed-title {
    font-family:'Oswald',sans-serif;
    font-size:9px;
    font-weight:700;
    letter-spacing:4px;
    text-transform:uppercase;
    color:rgba(184,134,11,0.9);
    border-bottom:1px solid rgba(139,26,26,0.4);
    padding-bottom:5px;
    margin-bottom:6px;
  }
  .roll-list {
    display:flex;
    flex-direction:column;
    gap:4px;
    max-height:430px;
    overflow:hidden;
  }
  .roll-item {
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(139,26,26,0.2);
    border-left:2px solid var(--blood);
    border-radius:2px;
    padding:5px 7px;
    animation:slideIn 0.3s ease;
  }
  .roll-item.master { border-left-color:var(--accent); }
  @keyframes slideIn { from{opacity:0;transform:translateX(10px)} to{opacity:1;transform:translateX(0)} }
  .roll-player {
    font-family:'Oswald',sans-serif;
    font-size:10px;
    font-weight:700;
    color:rgba(212,204,187,0.9);
    letter-spacing:1px;
  }
  .roll-player.master-name { color:rgba(184,134,11,0.95); }
  .roll-total {
    font-family:'Oswald',sans-serif;
    font-size:22px;
    font-weight:700;
    color:#fff;
    line-height:1;
    text-shadow:0 0 10px rgba(139,26,26,0.6);
  }
  .roll-total.crit  { color:#4caf50; text-shadow:0 0 12px rgba(76,175,80,0.7); }
  .roll-total.fail  { color:#ef5350; text-shadow:0 0 12px rgba(239,83,80,0.7); }
  .roll-detail {
    font-family:'Share Tech Mono',monospace;
    font-size:8px;
    color:rgba(212,204,187,0.5);
    margin-top:1px;
  }
  .roll-time {
    font-family:'Share Tech Mono',monospace;
    font-size:7px;
    color:rgba(184,134,11,0.6);
    float:right;
  }

  /* ── BOTTOM — Clima ── */
  .clima-bar {
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:var(--dark-bg);
    border:1px solid rgba(26,106,138,0.7);
    border-radius:4px;
    padding:6px 20px;
    display:none;
    align-items:center;
    gap:12px;
    backdrop-filter:blur(8px);
    white-space:nowrap;
  }
  .clima-bar.show { display:flex; }
  .clima-icon  { font-size:18px; }
  .clima-title { font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;color:#90caf9;letter-spacing:2px; }
  .clima-temp  { font-family:'Share Tech Mono',monospace;font-size:13px;color:#90caf9;margin-left:8px; }

  /* ── TOP — Título da campanha ── */
  .campaign-title {
    position:absolute;
    top:18px;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
    pointer-events:none;
  }
  .campaign-name {
    font-family:'Oswald',sans-serif;
    font-size:15px;
    font-weight:700;
    letter-spacing:8px;
    text-transform:uppercase;
    color:rgba(237,232,220,0.15);
    text-shadow:0 1px 6px rgba(0,0,0,0.5);
  }

  /* ── DAMAGE POPUP ── */
  .dmg-popup {
    position:absolute;
    font-family:'Oswald',sans-serif;
    font-size:32px;
    font-weight:700;
    pointer-events:none;
    z-index:100;
    animation:popUp 1.5s ease-out forwards;
  }
  .dmg-popup.dmg   { color:#ef5350; text-shadow:0 2px 10px rgba(239,83,80,.6); }
  .dmg-popup.heal  { color:#4caf50; text-shadow:0 2px 10px rgba(76,175,80,.6); }
  .dmg-popup.san   { color:#ab47bc; text-shadow:0 2px 10px rgba(171,71,188,.6); }
  .dmg-popup.fear  { color:#ff9800; text-shadow:0 2px 10px rgba(255,152,0,.6); }
  @keyframes popUp { 0%{opacity:1;transform:translateY(0)scale(1)} 50%{opacity:1;transform:translateY(-40px)scale(1.2)} 100%{opacity:0;transform:translateY(-80px)scale(.8)} }
</style>
</head>
<body>

<!-- TÍTULO DA CAMPANHA (sutil) -->
<div class="campaign-title">
  <div class="campaign-name">☠ Monte Carmesim</div>
</div>

<!-- ESQUERDA — Cards dos jogadores -->
<div class="left-panel">
  <div class="panel-title">▓ Agentes</div>
  <div id="cards-container"></div>
</div>

<!-- DIREITA — Feed de rolagens -->
<div class="right-panel">
  <div class="roll-feed">
    <div class="roll-feed-title">🎲 Rolagens</div>
    <div class="roll-list" id="roll-list">
      <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(212,204,187,0.3);text-align:center;padding:10px 0;">
        Aguardando...
      </div>
    </div>
  </div>
</div>

<!-- CLIMA -->
<div class="clima-bar" id="clima-bar">
  <span class="clima-icon" id="clima-icon">🌙</span>
  <span class="clima-title" id="clima-title">—</span>
  <span class="clima-temp"  id="clima-temp"></span>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const db = getDatabase(initializeApp({
  apiKey:"AIzaSyCSQXdyLvqC4zT2BkSwUKk-uostVn2BmA8",
  authDomain:"rpg-ficha-monte-carmesim.firebaseapp.com",
  databaseURL:"https://rpg-ficha-monte-carmesim-default-rtdb.firebaseio.com",
  projectId:"rpg-ficha-monte-carmesim",
  storageBucket:"rpg-ficha-monte-carmesim.firebasestorage.app",
  messagingSenderId:"909026041375",
  appId:"1:909026041375:web:df06386967dd9181a23f2a"
}));

const ORDER = ['Lucas','Gabi','Joao','Karina','Ana'];
let prevData = {};

// ── Players ────────────────────────────────────────────────────────────────
onValue(ref(db,'players'), snap => {
  const data = snap.val() || {};

  // Detect changes for popups
  ORDER.forEach(name => {
    const ps = prevData[name]?.stats || {};
    const cs = data[name]?.stats   || {};
    ['pv','pe','san'].forEach(k => {
      const pv = parseInt(ps[k+'_atual']) || 0;
      const cv = parseInt(cs[k+'_atual']) || 0;
      if (pv && pv !== cv) spawnPopup(name, k, cv - pv);
    });
    const pf = parseInt(ps.fear) || 0;
    const cf = parseInt(cs.fear) || 0;
    if (pf && pf !== cf) spawnPopup(name, 'fear', cf - pf);
  });

  prevData = JSON.parse(JSON.stringify(data));
  renderCards(data);
});

function renderCards(data) {
  const container = document.getElementById('cards-container');
  ORDER.filter(n => data[n]).forEach(name => {
    const p      = data[name];
    const st     = p.stats || {};
    const online = p.online === true;
    const pv  = parseInt(st.pv_atual)  || 0; const pvM = parseInt(st.pv_max)  || 1;
    const pe  = parseInt(st.pe_atual)  || 0; const peM = parseInt(st.pe_max)  || 1;
    const san = parseInt(st.san_atual) || 0; const sanM= parseInt(st.san_max) || 1;
    const fear = parseInt(st.fear) || 0;
    const pct = (a,b) => Math.min(100,Math.max(0,Math.round(a/b*100)));
    const fc = fear<=4?'#4caf50':fear<=8?'#cddc39':fear<=12?'#ff9800':fear<=16?'#f44336':'#b71c1c';

    const pips = Array.from({length:20},(_,i) => {
      const filled = i < fear;
      const col = i<4?'#4caf50':i<8?'#cddc39':i<12?'#ff9800':i<16?'#f44336':'#b71c1c';
      return `<div class="pip" style="background:${filled?col:'rgba(0,0,0,0.15)'}"></div>`;
    }).join('');

    let card = document.getElementById('oc-'+name);
    if (!card) {
      card = document.createElement('div');
      card.id = 'oc-'+name;
      card.className = 'player-card';
      container.appendChild(card);
    }
    card.className = 'player-card' + (online?'':' offline');
    card.innerHTML = `
      <div class="card-top">
        <div class="player-name">${name}</div>
        <div class="online-dot ${online?'on':'off'}"></div>
      </div>
      <div class="stat-row">
        <div class="stat-lbl">PV</div>
        <div class="bar-bg"><div class="bar-fill pv" style="width:${pct(pv,pvM)}%"></div></div>
        <div class="stat-val">${pv}/${pvM}</div>
      </div>
      <div class="stat-row">
        <div class="stat-lbl">PE</div>
        <div class="bar-bg"><div class="bar-fill pe" style="width:${pct(pe,peM)}%"></div></div>
        <div class="stat-val">${pe}/${peM}</div>
      </div>
      <div class="stat-row" style="margin-bottom:0">
        <div class="stat-lbl">SAN</div>
        <div class="bar-bg"><div class="bar-fill san" style="width:${pct(san,sanM)}%"></div></div>
        <div class="stat-val">${san}/${sanM}</div>
      </div>
      <div class="fear-wrap">
        <div class="fear-top">
          <span class="fear-lbl">☠ MEDO</span>
          <span class="fear-num" style="color:${fc}">${fear}/20</span>
        </div>
        <div class="fear-pips">${pips}</div>
      </div>`;
  });

  // Remove cards no longer in data
  document.querySelectorAll('.player-card').forEach(c => {
    const n = c.id.replace('oc-','');
    if (!data[n]) c.remove();
  });
}

// ── Rolls ──────────────────────────────────────────────────────────────────
onValue(ref(db,'rolls'), snap => {
  const d = snap.val();
  const list = document.getElementById('roll-list');
  if (!d || !Object.keys(d).length) {
    list.innerHTML = '<div style="font-family:\'Share Tech Mono\',monospace;font-size:9px;color:rgba(212,204,187,0.3);text-align:center;padding:10px 0;">Aguardando...</div>';
    return;
  }
  const entries = Object.entries(d)
    .map(([p,r]) => ({player:p,...r}))
    .sort((a,b) => (b.ts||0)-(a.ts||0))
    .slice(0, 8); // max 8 no overlay

  list.innerHTML = '';
  entries.forEach(({player,label,rolls,total,ts}) => {
    const time = ts ? new Date(ts).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) : '';
    const isMaster = player === '🎲 Mestre';
    const dieMax = parseInt((label||'').match(/d(\d+)/)?.[1] || 20);
    const pct = total / (dieMax * (rolls?.length||1));
    const resultClass = pct >= 0.9 ? 'crit' : pct <= 0.1 ? 'fail' : '';

    const el = document.createElement('div');
    el.className = 'roll-item' + (isMaster ? ' master' : '');
    el.innerHTML = `
      <span class="roll-time">${time}</span>
      <div class="roll-player ${isMaster?'master-name':''}">${player}</div>
      <div class="roll-total ${resultClass}">${total}</div>
      <div class="roll-detail">${label}${rolls&&rolls.length>1?' ['+rolls.join(', ')+']':''}</div>`;
    list.appendChild(el);
  });
});

// ── Clima ──────────────────────────────────────────────────────────────────
onValue(ref(db,'clima'), snap => {
  const d = snap.val();
  const bar = document.getElementById('clima-bar');
  if (!d || !d.active) { bar.classList.remove('show'); return; }
  bar.classList.add('show');
  document.getElementById('clima-icon').textContent  = d.icon   || '🌙';
  document.getElementById('clima-title').textContent = d.titulo || '—';
  document.getElementById('clima-temp').textContent  = d.temp   || '';
});

// ── Damage popup ───────────────────────────────────────────────────────────
function spawnPopup(playerName, stat, delta) {
  const card = document.getElementById('oc-'+playerName);
  if (!card) return;
  const rect = card.getBoundingClientRect();
  const el   = document.createElement('div');
  const type = delta > 0 ? 'heal' : stat === 'san' ? 'san' : stat === 'fear' ? 'fear' : 'dmg';
  const icon = stat==='san'?'🧠':stat==='fear'?'☠':stat==='pe'?'◈':'❤';
  el.className = 'dmg-popup ' + type;
  el.textContent = (delta > 0 ? '+' : '') + delta + ' ' + icon;
  el.style.left = (rect.left + rect.width * 0.5 - 20) + 'px';
  el.style.top  = (rect.top  + rect.height * 0.3) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1600);
}
</script>
</body>
</html>
