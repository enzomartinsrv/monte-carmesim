<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overlay · Monte Carmesim</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; margin:0; padding:0; }

  /* Fundo 100% transparente para o OBS */
  html, body {
    background: transparent !important;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Barlow Condensed', sans-serif;
  }

  /* Container lateral esquerdo */
  .overlay-container {
    position: absolute;
    top: 40px;
    left: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 220px;
  }

  /* Card de cada jogador */
  .player-card {
    background: rgba(237, 232, 220, 0.92);
    border: 1px solid rgba(189, 176, 160, 0.8);
    border-left: 3px solid #8B1A1A;
    border-radius: 4px;
    padding: 8px 10px;
    backdrop-filter: blur(4px);
    animation: fadeIn .4s ease;
  }
  .player-card.offline { opacity: 0.5; border-left-color: #aaa; }

  @keyframes fadeIn { from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:translateX(0); } }

  /* Nome do jogador */
  .player-name {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #1a0a00;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .online-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .online-dot.on  { background: #4caf50; box-shadow: 0 0 4px #4caf50; }
  .online-dot.off { background: #aaa; }

  /* Barras de stats */
  .stat-row {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-bottom: 4px;
  }
  .stat-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    color: #6b5e50;
    width: 26px;
    flex-shrink: 0;
    letter-spacing: 0.5px;
  }
  .bar-wrap {
    flex: 1;
    height: 7px;
    background: rgba(0,0,0,0.1);
    border-radius: 2px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }
  .bar-fill.pv  { background: linear-gradient(to right, #8B1A1A, #e53935); }
  .bar-fill.pe  { background: linear-gradient(to right, #006060, #26a69a); }
  .bar-fill.san { background: linear-gradient(to right, #4A235A, #9c27b0); }
  .stat-nums {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: #1a0a00;
    width: 38px;
    text-align: right;
    flex-shrink: 0;
  }

  /* Medidor de medo */
  .fear-row {
    margin-top: 5px;
    padding-top: 5px;
    border-top: 1px solid rgba(0,0,0,0.1);
  }
  .fear-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 3px;
  }
  .fear-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    color: #6b5e50;
    letter-spacing: 0.5px;
  }
  .fear-value {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    font-weight: 700;
    transition: color 0.4s;
  }
  .fear-pips {
    display: flex;
    gap: 1.5px;
  }
  .fear-pip {
    flex: 1;
    height: 5px;
    border-radius: 1px;
    transition: background 0.3s;
  }

  /* Clima — aparece no topo centralizado */
  .clima-bar {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 10, 24, 0.85);
    border: 1px solid rgba(26, 42, 74, 0.8);
    border-radius: 4px;
    padding: 5px 16px;
    display: none;
    align-items: center;
    gap: 10px;
    backdrop-filter: blur(4px);
    white-space: nowrap;
  }
  .clima-bar.visible { display: flex; }
  .clima-icon  { font-size: 16px; }
  .clima-title { font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 600; color: #90caf9; letter-spacing: 2px; }
  .clima-temp  { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: #90caf9; margin-left: 8px; }

  /* Animação de dano/cura */
  .damage-popup {
    position: absolute;
    font-family: 'Oswald', sans-serif;
    font-size: 28px;
    font-weight: 700;
    pointer-events: none;
    animation: popUp 1.4s ease-out forwards;
    z-index: 100;
  }
  .damage-popup.dmg  { color: #e53935; text-shadow: 0 2px 8px rgba(229,57,53,.5); }
  .damage-popup.heal { color: #4caf50; text-shadow: 0 2px 8px rgba(76,175,80,.5); }
  .damage-popup.san  { color: #9c27b0; text-shadow: 0 2px 8px rgba(156,39,176,.5); }
  .damage-popup.fear { color: #ff9800; text-shadow: 0 2px 8px rgba(255,152,0,.5); }
  @keyframes popUp { 0%{opacity:1;transform:translateY(0) scale(1)} 50%{opacity:1;transform:translateY(-30px) scale(1.2)} 100%{opacity:0;transform:translateY(-60px) scale(.8)} }

</style>
</head>
<body>

<!-- CLIMA BAR -->
<div class="clima-bar" id="clima-bar">
  <span class="clima-icon" id="clima-icon">🌙</span>
  <span class="clima-title" id="clima-title">—</span>
  <span class="clima-temp" id="clima-temp">—</span>
</div>

<!-- PLAYER CARDS -->
<div class="overlay-container" id="overlay-container">
  <!-- cards injetados via JS -->
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const db = getDatabase(initializeApp({
  apiKey:"AIzaSyCSQXdyLvqC4zT2BkSwUKk-uostVn2BmA8",
  authDomain:"rpg-ficha-monte-carmesim.firebaseapp.com",
  databaseURL:"https://rpg-ficha-monte-carmesim-default-rtdb.firebaseio.com",
  projectId:"rpg-ficha-monte-carmesim",
  storageBucket:"rpg-ficha-monte-carmesim.firebasestorage.app",
  messagingSenderId:"909026041375",
  appId:"1:909026041375:web:df06386967dd9181a23f2a"
}));

// ── Player order (fixed so cards don't jump around) ────────────────────────
const PLAYER_ORDER = ['Lucas','Gabi','Joao','Karina','Ana'];
let playerData = {};

// ── Watch players ──────────────────────────────────────────────────────────
onValue(ref(db,'players'), snap => {
  const prev = JSON.stringify(playerData);
  playerData = snap.val() || {};
  const next = JSON.stringify(playerData);

  // Detect changes for popup animations
  if (prev !== '{}') {
    try {
      const prevObj = JSON.parse(prev);
      Object.entries(playerData).forEach(([name, p]) => {
        const ps = prevObj[name]?.stats || {};
        const cs = p.stats || {};
        ['pv','pe','san'].forEach(stat => {
          const pv = parseInt(ps[stat+'_atual']) || 0;
          const cv = parseInt(cs[stat+'_atual']) || 0;
          if (pv !== cv && pv !== 0) showPopup(name, stat, cv - pv);
        });
        const pf = parseInt(ps?.fear) || 0;
        const cf = parseInt(cs?.fear) || 0;
        if (pf !== cf && pf !== 0) showPopup(name, 'fear', cf - pf);
      });
    } catch(e) {}
  }

  renderCards();
});

// ── Watch clima ────────────────────────────────────────────────────────────
onValue(ref(db,'clima'), snap => {
  const d = snap.val();
  const bar = document.getElementById('clima-bar');
  if (!d || !d.active) { bar.classList.remove('visible'); return; }
  bar.classList.add('visible');
  document.getElementById('clima-icon').textContent  = d.icon  || '🌙';
  document.getElementById('clima-title').textContent = d.titulo|| '—';
  document.getElementById('clima-temp').textContent  = d.temp  || '';
});

// ── Render all cards ───────────────────────────────────────────────────────
function renderCards() {
  const container = document.getElementById('overlay-container');

  // Use fixed order, only show players that exist in Firebase
  const players = PLAYER_ORDER.filter(n => playerData[n]);

  players.forEach(name => {
    const player = playerData[name];
    const existing = document.getElementById('card-' + name);
    const cardHTML = buildCard(name, player);
    if (existing) {
      existing.outerHTML = cardHTML;
    } else {
      container.insertAdjacentHTML('beforeend', cardHTML);
    }
  });

  // Remove cards for players no longer in data
  container.querySelectorAll('.player-card').forEach(card => {
    const n = card.id.replace('card-','');
    if (!playerData[n]) card.remove();
  });
}

function buildCard(name, player) {
  const st     = player.stats || {};
  const online = player.online === true;
  const pv  = parseInt(st.pv_atual)  ?? 0;
  const pvM = parseInt(st.pv_max)    || 1;
  const pe  = parseInt(st.pe_atual)  ?? 0;
  const peM = parseInt(st.pe_max)    || 1;
  const san = parseInt(st.san_atual) ?? 0;
  const sanM= parseInt(st.san_max)   || 1;
  const fear = parseInt(st.fear) || 0;

  const pct = (a,b) => Math.min(100, Math.max(0, Math.round((a/b)*100)));
  const fearColor = fear<=4?'#4caf50':fear<=8?'#cddc39':fear<=12?'#ff9800':fear<=16?'#f44336':'#b71c1c';

  // Fear pips
  const pips = Array.from({length:20},(_,i) => {
    const filled = i < fear;
    const zone   = i < 4 ? '#4caf50' : i < 8 ? '#cddc39' : i < 12 ? '#ff9800' : i < 16 ? '#f44336' : '#b71c1c';
    const bg     = filled ? zone : 'rgba(0,0,0,0.12)';
    return `<div class="fear-pip" style="background:${bg};"></div>`;
  }).join('');

  return `<div class="player-card ${online?'':'offline'}" id="card-${name}">
    <div class="player-name">
      <span>${name}</span>
      <div class="online-dot ${online?'on':'off'}"></div>
    </div>
    <div class="stat-row">
      <div class="stat-label">PV</div>
      <div class="bar-wrap"><div class="bar-fill pv" style="width:${pct(pv,pvM)}%"></div></div>
      <div class="stat-nums">${pv}/${pvM}</div>
    </div>
    <div class="stat-row">
      <div class="stat-label">PE</div>
      <div class="bar-wrap"><div class="bar-fill pe" style="width:${pct(pe,peM)}%"></div></div>
      <div class="stat-nums">${pe}/${peM}</div>
    </div>
    <div class="stat-row" style="margin-bottom:0;">
      <div class="stat-label">SAN</div>
      <div class="bar-wrap"><div class="bar-fill san" style="width:${pct(san,sanM)}%"></div></div>
      <div class="stat-nums">${san}/${sanM}</div>
    </div>
    <div class="fear-row">
      <div class="fear-header">
        <span class="fear-label">☠ MEDO</span>
        <span class="fear-value" style="color:${fearColor};">${fear}/20</span>
      </div>
      <div class="fear-pips">${pips}</div>
    </div>
  </div>`;
}

// ── Damage/heal popup animation ────────────────────────────────────────────
function showPopup(playerName, stat, delta) {
  const card = document.getElementById('card-' + playerName);
  if (!card) return;
  const rect = card.getBoundingClientRect();
  const popup = document.createElement('div');
  popup.className = 'damage-popup ' + (delta > 0 ? 'heal' : stat === 'san' ? 'san' : stat === 'fear' ? 'fear' : 'dmg');
  const sign = delta > 0 ? '+' : '';
  const icon = stat === 'san' ? '🧠' : stat === 'fear' ? '☠' : stat === 'pe' ? '◈' : '❤';
  popup.textContent = sign + delta + ' ' + icon;
  popup.style.left = (rect.left + rect.width / 2) + 'px';
  popup.style.top  = (rect.top  + rect.height / 2) + 'px';
  document.body.appendChild(popup);
  setTimeout(() => popup.remove(), 1500);
}
</script>
</body>
</html>
